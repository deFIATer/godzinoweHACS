title: Ceny jutro
path: ceny-jutro
icon: mdi:calendar-arrow-right
panel: true
cards:
  - type: vertical-stack
    cards:
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.plan_cen_jutro
            name: Plan jutro
            icon: mdi:calendar-arrow-right
          - type: entity
            entity: sensor.liczba_tanich_godzin_jutro
            name: Tanie godziny
            icon: mdi:clock-check-outline
          - type: entity
            entity: sensor.liczba_drogich_godzin_jutro
            name: Drogie godziny
            icon: mdi:clock-alert-outline
          - type: markdown
            title: Cena teraz
            content: |
              ## {{ '%.2f' | format(states('sensor.aktualna_cena_z_taryfa') | float(0)) }} zl/kWh

      - type: custom:apexcharts-card
        header:
          show: true
          title: Ceny energii - jutro
          show_states: true
        graph_span: 24h
        span:
          start: day
          offset: +1d
        experimental:
          color_threshold: true
        apex_config:
          chart:
            height: 560
            toolbar:
              show: true
            zoom:
              enabled: true
          grid:
            borderColor: "#334155"
            strokeDashArray: 4
          legend:
            show: true
            position: bottom
          stroke:
            curve: stepline
            width: 5
            lineCap: round
          markers:
            size: 0
            hover:
              size: 6
          dataLabels:
            enabled: false
          tooltip:
            "y":
              formatter: |
                EVAL:function(value) {
                  return Number(value).toFixed(2) + " zl/kWh";
                }
          yaxis:
            decimalsInFloat: 2
            labels:
              formatter: |
                EVAL:function(value) {
                  return Number(value).toFixed(2);
                }
            title:
              text: zl/kWh
          xaxis:
            labels:
              datetimeUTC: false
              format: HH:mm
          annotations:
            yaxis:
              - y: 0.35
                borderColor: "#22c55e"
                strokeDashArray: 5
                label:
                  text: Niskie ceny
                  style:
                    background: "#22c55e"
                    color: "#ffffff"
              - y: 0.55
                borderColor: "#f97316"
                strokeDashArray: 5
                label:
                  text: Wysokie ceny
                  style:
                    background: "#f97316"
                    color: "#ffffff"
        series:
          - entity: sensor.plan_cen_jutro
            name: Cena jutro
            type: line
            color_threshold:
              - value: -999
                color: "#38bdf8"
              - value: 0.15
                color: "#22c55e"
              - value: 0.35
                color: "#eab308"
              - value: 0.55
                color: "#f97316"
              - value: 0.75
                color: "#ef4444"
            data_generator: |
              const records = entity.attributes.records || [];
              const date = entity.attributes.date;
              return records
                .filter((record) => record.total_price !== undefined && record.total_price !== null)
                .map((record) => {
                  const hour = String(record.hour || "00-01").split("-")[0].padStart(2, "0");
                  return [new Date(`${date}T${hour}:00:00`).getTime(), Number(record.total_price)];
                });

      - type: markdown
        title: Godziny jutro
        content: |
          **Tanie godziny:** {{ state_attr('sensor.plan_cen_jutro', 'cheap_hours') | join(', ') }}

          **Drogie godziny:** {{ state_attr('sensor.plan_cen_jutro', 'expensive_hours') | join(', ') }}

          {% set cheapest = state_attr('sensor.plan_cen_jutro', 'cheapest_hours') %}
          {% if cheapest %}
          **Najtansza godzina:** {{ cheapest[0].hour }} - {{ '%.2f' | format(cheapest[0].total_price | float) }} zl/kWh
          {% else %}
          **Najtansza godzina:** brak danych
          {% endif %}
