title: Ceny energii
views:
  - title: Energia
    path: ceny-energii
    icon: mdi:transmission-tower
    cards:
      - type: markdown
        title: Teraz
        content: |
          ## {{ '%.2f' | format(states('sensor.aktualna_cena_z_taryfa') | float(0)) }} zl/kWh

          **Cena rynkowa:** {{ '%.2f' | format(states('sensor.aktualna_cena_rynkowa') | float(0)) }} zl/kWh
          **Klasyfikacja:** {{ states('sensor.klasyfikacja_ceny') }}
          **Energia tania:** {{ states('binary_sensor.energia_tania') }}
          **Energia droga:** {{ states('binary_sensor.energia_droga') }}

      - type: custom:apexcharts-card
        header:
          show: true
          title: Ceny godzinowe dzisiaj
          show_states: false
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Teraz
        apex_config:
          chart:
            height: 320
          plotOptions:
            bar:
              columnWidth: 75%
          tooltip:
            "y":
              formatter: |
                EVAL:function(value) {
                  return Number(value).toFixed(2) + " zl/kWh";
                }
          yaxis:
            decimalsInFloat: 2
            labels:
              formatter: |
                EVAL:function(value) {
                  return Number(value).toFixed(2);
                }
            title:
              text: zl/kWh
          xaxis:
            labels:
              datetimeUTC: false
        series:
          - entity: sensor.plan_cen_dzis
            name: Cena z taryfa
            type: column
            color: "#2f80ed"
            data_generator: |
              const records = entity.attributes.records || [];
              const date = entity.attributes.date;
              return records
                .filter((record) => record.total_price !== undefined && record.total_price !== null)
                .map((record) => {
                  const hour = String(record.hour || "00-01").split("-")[0].padStart(2, "0");
                  return [new Date(`${date}T${hour}:00:00`).getTime(), Number(record.total_price)];
                });
          - entity: sensor.plan_cen_dzis
            name: Cena rynkowa
            type: line
            color: "#27ae60"
            stroke_width: 3
            data_generator: |
              const records = entity.attributes.records || [];
              const date = entity.attributes.date;
              return records
                .filter((record) => record.price_per_kwh !== undefined && record.price_per_kwh !== null)
                .map((record) => {
                  const hour = String(record.hour || "00-01").split("-")[0].padStart(2, "0");
                  return [new Date(`${date}T${hour}:00:00`).getTime(), Number(record.price_per_kwh)];
                });

      - type: conditional
        conditions:
          - entity: sensor.plan_cen_jutro
            state: available
        card:
          type: custom:apexcharts-card
          header:
            show: true
            title: Ceny godzinowe jutro
            show_states: false
          graph_span: 24h
          span:
            start: day
            offset: +1d
          apex_config:
            chart:
              height: 320
            plotOptions:
              bar:
                columnWidth: 75%
            tooltip:
              "y":
                formatter: |
                  EVAL:function(value) {
                    return Number(value).toFixed(2) + " zl/kWh";
                  }
            yaxis:
              decimalsInFloat: 2
              labels:
                formatter: |
                  EVAL:function(value) {
                    return Number(value).toFixed(2);
                  }
              title:
                text: zl/kWh
            xaxis:
              labels:
                datetimeUTC: false
          series:
            - entity: sensor.plan_cen_jutro
              name: Cena z taryfa
              type: column
              color: "#9b51e0"
              data_generator: |
                const records = entity.attributes.records || [];
                const date = entity.attributes.date;
                return records
                  .filter((record) => record.total_price !== undefined && record.total_price !== null)
                  .map((record) => {
                    const hour = String(record.hour || "00-01").split("-")[0].padStart(2, "0");
                    return [new Date(`${date}T${hour}:00:00`).getTime(), Number(record.total_price)];
                  });
            - entity: sensor.plan_cen_jutro
              name: Cena rynkowa
              type: line
              color: "#f2994a"
              stroke_width: 3
              data_generator: |
                const records = entity.attributes.records || [];
                const date = entity.attributes.date;
                return records
                  .filter((record) => record.price_per_kwh !== undefined && record.price_per_kwh !== null)
                  .map((record) => {
                    const hour = String(record.hour || "00-01").split("-")[0].padStart(2, "0");
                    return [new Date(`${date}T${hour}:00:00`).getTime(), Number(record.price_per_kwh)];
                  });

      - type: conditional
        conditions:
          - entity: sensor.plan_cen_jutro
            state_not: available
        card:
          type: markdown
          title: Ceny godzinowe jutro
          content: |
            Dane na jutro nie sa jeszcze dostepne.

            Poczekaj do godziny **12:00** - wtedy powinny sie pojawic.

      - type: markdown
        title: Dzisiaj - podsumowanie
        content: |
          {% set stats = state_attr('sensor.plan_cen_dzis', 'total_price_statistics') or {} %}
          {% set cheapest = state_attr('sensor.plan_cen_dzis', 'cheapest_hours') or [] %}
          {% set expensive = state_attr('sensor.plan_cen_dzis', 'most_expensive_hours') or [] %}

          **Minimum:** {{ '%.2f' | format(stats.min_price | float(0)) }} zl/kWh
          **Srednia:** {{ '%.2f' | format(stats.avg_price | float(0)) }} zl/kWh
          **Maksimum:** {{ '%.2f' | format(stats.max_price | float(0)) }} zl/kWh

          **Najtansze godziny:**
          {% if cheapest %}
          {% for hour in cheapest %}
          - {{ hour.hour }} - {{ '%.2f' | format(hour.total_price | float(0)) }} zl/kWh ({{ hour.classification }})
          {% endfor %}
          {% else %}
          - Brak danych
          {% endif %}

          **Najdrozsze godziny:**
          {% if expensive %}
          {% for hour in expensive %}
          - {{ hour.hour }} - {{ '%.2f' | format(hour.total_price | float(0)) }} zl/kWh ({{ hour.classification }})
          {% endfor %}
          {% else %}
          - Brak danych
          {% endif %}

      - type: conditional
        conditions:
          - entity: sensor.plan_cen_jutro
            state: available
        card:
          type: markdown
          title: Jutro - podsumowanie
          content: |
            {% set stats = state_attr('sensor.plan_cen_jutro', 'total_price_statistics') or {} %}
            {% set cheapest = state_attr('sensor.plan_cen_jutro', 'cheapest_hours') or [] %}
            {% set expensive = state_attr('sensor.plan_cen_jutro', 'most_expensive_hours') or [] %}

            **Minimum:** {{ '%.2f' | format(stats.min_price | float(0)) }} zl/kWh
            **Srednia:** {{ '%.2f' | format(stats.avg_price | float(0)) }} zl/kWh
            **Maksimum:** {{ '%.2f' | format(stats.max_price | float(0)) }} zl/kWh

            **Najtansze godziny:**
            {% if cheapest %}
            {% for hour in cheapest %}
            - {{ hour.hour }} - {{ '%.2f' | format(hour.total_price | float(0)) }} zl/kWh ({{ hour.classification }})
            {% endfor %}
            {% else %}
            - Brak danych
            {% endif %}

            **Najdrozsze godziny:**
            {% if expensive %}
            {% for hour in expensive %}
            - {{ hour.hour }} - {{ '%.2f' | format(hour.total_price | float(0)) }} zl/kWh ({{ hour.classification }})
            {% endfor %}
            {% else %}
            - Brak danych
            {% endif %}
